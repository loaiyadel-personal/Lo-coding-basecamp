<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Loaiy Adel CV</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ══════════════  LOGIN SCREEN  ══════════════ -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-l">L</span><span class="brand-a">A</span>
    </div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Loaiy Adel · CV Dashboard</p>
    <form class="login-form" id="loginForm" autocomplete="off">
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter admin password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-label">Sign In</span>
        <span class="spinner" hidden></span>
      </button>
      <p class="login-error" id="loginError"></p>
    </form>
  </div>
</div>

<!-- ══════════════  DASHBOARD  ══════════════ -->
<div class="dashboard" id="dashboard" hidden>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="brand-l">L</span><span class="brand-a">A</span>
      <span class="sidebar-name">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="messages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Messages</span>
        <span class="badge" id="unreadBadge" hidden>0</span>
      </button>
      <button class="nav-item" data-tab="analytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>Analytics</span>
      </button>
      <button class="nav-item" data-tab="cv">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        <span>CV Editor</span>
      </button>
    </nav>
    <button class="btn-logout" id="logoutBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Logout
    </button>
  </aside>

  <!-- Main content -->
  <main class="main">

    <!-- Top bar -->
    <header class="topbar">
      <div>
        <h2 class="topbar-title" id="topbarTitle">Messages</h2>
        <p class="topbar-sub" id="topbarSub">Contact form submissions</p>
      </div>
      <button class="btn-refresh" id="refreshBtn" title="Refresh">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </header>

    <!-- ── MESSAGES TAB ── -->
    <section class="tab" id="tab-messages">
      <div class="stats-row" id="msgStats"></div>
      <div class="card table-card">
        <div class="table-wrap">
          <table class="data-table" id="messagesTable">
            <thead>
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Subject</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="messagesBody">
              <tr><td colspan="6" class="empty">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- ── ANALYTICS TAB ── -->
    <section class="tab" id="tab-analytics" hidden>
      <div class="stats-row" id="analyticsStats"></div>
      <div class="analytics-grid">
        <div class="card chart-card">
          <h3 class="card-title">Visits — Last 30 Days</h3>
          <div class="chart-wrap" id="chartWrap">
            <div class="empty">No visit data yet</div>
          </div>
        </div>
        <div class="card">
          <h3 class="card-title">Top Referrers</h3>
          <div id="referrerList" class="referrer-list">
            <div class="empty">No referrer data yet</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ── CV EDITOR TAB ── -->
    <section class="tab" id="tab-cv" hidden>
      <div class="cv-tabs">
        <button class="cv-tab active" data-section="profile">Profile</button>
        <button class="cv-tab" data-section="experience">Experience</button>
        <button class="cv-tab" data-section="skills">Skills</button>
        <button class="cv-tab" data-section="certifications">Certifications</button>
      </div>

      <!-- Profile editor -->
      <div class="cv-section" id="cv-profile">
        <div class="card">
          <h3 class="card-title">Edit Profile</h3>
          <form class="edit-form" id="profileForm">
            <div class="form-grid">
              <div class="field"><label>Full Name</label><input type="text" name="name"></div>
              <div class="field"><label>Title</label><input type="text" name="title"></div>
              <div class="field"><label>Subtitle</label><input type="text" name="subtitle"></div>
              <div class="field"><label>Email</label><input type="email" name="email"></div>
              <div class="field"><label>Phone</label><input type="text" name="phone"></div>
              <div class="field"><label>Location</label><input type="text" name="location"></div>
              <div class="field"><label>LinkedIn URL</label><input type="url" name="linkedin"></div>
              <div class="field"><label>Status Chip</label><input type="text" name="statusChip"></div>
            </div>
            <div class="field full"><label>Bio</label><textarea name="bio" rows="4"></textarea></div>
            <div class="form-actions">
              <button type="submit" class="btn-save">Save Profile</button>
              <span class="save-status" id="profileSaveStatus"></span>
            </div>
          </form>
        </div>
      </div>

      <!-- Experience editor -->
      <div class="cv-section" id="cv-experience" hidden>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Work Experience</h3>
            <button class="btn-add" id="addExpBtn">+ Add Role</button>
          </div>
          <div id="expList" class="item-list"></div>
        </div>
      </div>

      <!-- Skills editor -->
      <div class="cv-section" id="cv-skills" hidden>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Skills</h3>
            <button class="btn-add" id="addSkillBtn">+ Add Category</button>
          </div>
          <div id="skillList" class="item-list"></div>
        </div>
      </div>

      <!-- Certifications editor -->
      <div class="cv-section" id="cv-certifications" hidden>
        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Certifications</h3>
            <button class="btn-add" id="addCertBtn">+ Add Cert</button>
          </div>
          <div id="certList" class="item-list"></div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- ══  CONTENT MODAL  ══ -->
<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 id="modalTitle">Message</h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ══  CONFIRM MODAL (replaces browser confirm())  ══ -->
<div class="modal-overlay" id="confirmOverlay" hidden>
  <div class="modal confirm-modal">
    <div class="modal-header">
      <h3 id="confirmTitle">Are you sure?</h3>
    </div>
    <div class="modal-body">
      <p id="confirmMsg" style="color:var(--text-mid);font-size:.9rem"></p>
      <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.25rem">
        <button class="btn-cancel" id="confirmNo">Cancel</button>
        <button class="btn-danger" id="confirmYes">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- ══  TOAST NOTIFICATIONS  ══ -->
<div class="toast-container" id="toastContainer"></div>

<script src="admin.js"></script>
</body>
</html>
